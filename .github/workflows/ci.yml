name: CI

on:
  # Disabled on pull_request by user request — was running on every PR push.
  # Keep workflow_dispatch so the job is still runnable manually from the
  # Actions tab when we want a full CI pass.
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run release guards
        run: npm run release:guard

      - name: Build frontend
        run: npm run build
