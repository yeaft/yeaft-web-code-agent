name: Dev Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true
        type: string

concurrency:
  group: dev-release
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Resolve tag/commit for both push and workflow_dispatch triggers.
  # All downstream jobs reference outputs.tag / outputs.commit for consistency.
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      commit: ${{ steps.resolve.outputs.commit }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag and commit
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            git fetch --tags origin
            TAG_COMMIT=$(git rev-list -n 1 "refs/tags/${TAG}" 2>/dev/null || true)
            if [ -z "$TAG_COMMIT" ]; then
              echo "::error::Tag '${TAG}' not found in this repository."
              exit 1
            fi
          else
            TAG="${{ github.ref_name }}"
            TAG_COMMIT="${{ github.sha }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "commit=${TAG_COMMIT}" >> "$GITHUB_OUTPUT"

      - name: Verify tag commit is on main
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          TAG_COMMIT="${{ steps.resolve.outputs.commit }}"
          echo "Tag: ${TAG}"
          echo "Commit: ${TAG_COMMIT}"

          if ! git merge-base --is-ancestor "${TAG_COMMIT}" origin/main; then
            echo ""
            echo "::error::Tag '${TAG}' points to commit ${TAG_COMMIT} which is NOT on the main branch."
            echo "::error::Tags MUST only be created from the main branch."
            echo ""
            echo "Branches containing this commit:"
            git branch -r --contains "${TAG_COMMIT}"
            exit 1
          fi

          echo "Tag is on main branch."

  test:
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-tag.outputs.commit }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run release guards
        run: npm run release:guard

      - name: Build frontend
        run: npm run build

  publish-agent:
    runs-on: ubuntu-latest
    needs: [validate-tag, test]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-tag.outputs.commit }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        run: |
          TAG="${{ needs.validate-tag.outputs.tag }}"
          VERSION=${TAG#v}
          cd agent && npm version $VERSION --no-git-tag-version

      - name: Publish to npm
        run: cd agent && npm publish --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    runs-on: ubuntu-latest
    needs: [validate-tag, test]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-tag.outputs.commit }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
          build-args: BUILD_VERSION=${{ needs.validate-tag.outputs.tag }}
