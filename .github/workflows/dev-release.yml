name: Dev Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: dev-release
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Ensure tag is on main branch — reject tags from feature branches
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main
        run: |
          TAG_COMMIT=${{ github.sha }}
          echo "Tag: ${{ github.ref_name }}"
          echo "Commit: $TAG_COMMIT"

          # Check if the tagged commit is reachable from origin/main
          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo ""
            echo "::error::Tag '${{ github.ref_name }}' points to commit $TAG_COMMIT which is NOT on the main branch."
            echo "::error::Tags MUST only be created from the main branch."
            echo ""
            echo "Branches containing this commit:"
            git branch -r --contains "$TAG_COMMIT"
            exit 1
          fi

          echo "Tag is on main branch."

  test:
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

  publish-agent:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd agent && npm version $VERSION --no-git-tag-version

      - name: Publish to npm
        run: cd agent && npm publish --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
          build-args: BUILD_VERSION=${{ github.ref_name }}
