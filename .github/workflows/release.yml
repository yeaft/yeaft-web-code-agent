name: Release

on:
  push:
    tags:
      - 'release-*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Legacy image name for deployments that still pull the pre-rename package.
  LEGACY_IMAGE_NAME: ${{ github.repository_owner }}/claude-web-chat

jobs:
  # Ensure tag is on main branch — reject tags from feature branches
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main
        run: |
          TAG_COMMIT=${{ github.sha }}
          echo "Tag: ${{ github.ref_name }}"
          echo "Commit: $TAG_COMMIT"

          # Check if the tagged commit is reachable from origin/main
          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo ""
            echo "::error::Tag '${{ github.ref_name }}' points to commit $TAG_COMMIT which is NOT on the main branch."
            echo "::error::Tags MUST only be created from the main branch."
            echo ""
            echo "Branches containing this commit:"
            git branch -r --contains "$TAG_COMMIT"
            exit 1
          fi

          echo "Tag is on main branch."

  # Run tests before publishing
  test:
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

  # Build and push Docker image for server
  publish-docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#release-}
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY }}/${{ env.LEGACY_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BUILD_VERSION=${{ github.ref_name }}

  # Create GitHub Release
  github-release:
    runs-on: ubuntu-latest
    needs: [publish-docker]
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
